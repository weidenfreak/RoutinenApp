<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F9B84B">
<link rel="manifest" href="manifest.json">
<title>Routinen</title>
<style>
:root {
  --cream:    #FFF8F0;
  --green:    #A8D5B5;
  --green-dk: #1E5E34;
  --teal:     #9DD4CF;
  --teal-dk:  #2E7A74;
  --amber:    #F9D98A;
  --peach:    #FECAA0;
  --text:     #2D2D2D;
  --muted:    #888;
  --r-lg: 24px;
  --r-md: 16px;
  --r-sm: 12px;
  --sh:   0 4px 16px rgba(0,0,0,.10);
  --sh-s: 0 2px 8px  rgba(0,0,0,.07);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

html, body { height:100%; font-family: system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--cream); color:var(--text); }

/* ══ SCREENS ══ */
.screen { display:none; flex-direction:column; min-height:100dvh; min-height:100vh; }
.screen.active { display:flex; animation:fadeIn .25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ══ HOME ══ */
#screen-home {
  align-items:stretch; justify-content:center;
  padding:40px 24px 80px; gap:20px;
  background:linear-gradient(160deg,#FFF8F0 0%,#FFF0D4 100%);
}
.app-title { text-align:center; font-size:clamp(1.5rem,5vw,2.2rem); font-weight:800; margin-bottom:8px; }

.mode-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; padding:40px 20px;
  border-radius:var(--r-lg); border:none; cursor:pointer;
  box-shadow:var(--sh); color:white; position:relative; overflow:hidden;
  transition:transform .15s ease;
}
.mode-card::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background .15s; }
.mode-card:active { transform:scale(.97); }
.mode-card:active::after { background:rgba(255,255,255,.15); }
.mode-card.morning { background:linear-gradient(135deg,#F9B84B 0%,#F07A30 100%); }
.mode-card.evening { background:linear-gradient(135deg,#7B9FD4 0%,#4A6FA5 100%); }
.mode-emoji { font-size:clamp(3.5rem,11vw,5.5rem); line-height:1; }
.mode-label { font-size:clamp(1.4rem,4.5vw,2.1rem); font-weight:700; }

/* ══ SETTINGS BUTTON ══ */
#settings-btn {
  position:fixed; bottom:18px; right:18px;
  width:44px; height:44px; border-radius:50%; border:none;
  background:rgba(0,0,0,.06); font-size:1.3rem; cursor:pointer;
  opacity:.3; display:flex; align-items:center; justify-content:center;
  z-index:50; transition:opacity .2s;
}
#settings-btn:hover { opacity:.55; }

/* ══ ROUTINE HEADER ══ */
.routine-header {
  position:sticky; top:0;
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.06);
  z-index:20;
}
.back-btn {
  width:52px; height:52px; border-radius:var(--r-sm); border:none;
  background:#F4F4F4; font-size:1.9rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .15s;
}
.back-btn:active { background:#E0E0E0; }

/* ══ TIME DISPLAY ══ */
.time-display { flex:1; display:flex; flex-direction:column; gap:5px; }
.time-track { height:14px; background:#EEE; border-radius:7px; overflow:hidden; }
.time-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--teal),#5BB8B0);
  border-radius:7px; transition:width .8s ease;
}
.time-fill.over { background:linear-gradient(90deg,var(--amber),#F4A942); }
.time-label { font-size:.82rem; font-weight:700; color:var(--muted); text-align:right; }

/* ══ ROUTINE BODY ══ */
.routine-body { padding:16px; display:flex; flex-direction:column; gap:10px; flex:1; }

/* ══ TASK LIST ══ */
#task-list { display:flex; flex-direction:column; gap:10px; }

.task-row {
  display:flex; align-items:center;
  background:#fff; border-radius:var(--r-md);
  box-shadow:var(--sh-s); min-height:80px;
  border:3px solid transparent;
  transition:opacity .2s, transform .15s, box-shadow .15s;
  overflow:hidden;
}
.task-row.done { opacity:.4; }
.task-row.last-step { border-color:#C8EDD8; }
.task-row.dragging {
  opacity:.55; transform:scale(.98);
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  z-index:10;
}

.drag-handle {
  width:56px; min-height:80px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; color:#CCC; cursor:grab;
  touch-action:none; /* must be none to allow dragging */
  user-select:none;
}
.task-row.done .drag-handle { visibility:hidden; }
.task-row.last-step .drag-handle { visibility:hidden; }

.task-content { flex:1; padding:14px 4px; min-width:0; }
.task-emoji-big { font-size:clamp(2rem,7vw,2.6rem); line-height:1; }
.task-name { font-size:clamp(.88rem,2.6vw,1.05rem); font-weight:600; margin-top:4px; line-height:1.25; }
.task-dur  { font-size:.75rem; color:var(--muted); margin-top:2px; }
.task-tag  { display:inline-block; font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px; margin-top:3px; background:#C8EDD8; color:#1A5E32; }

.btn-check {
  width:72px; height:72px; margin:4px 8px 4px 4px; flex-shrink:0;
  border-radius:50%; border:3px solid #E0E0E0;
  background:#fff; font-size:1.8rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.btn-check:active { transform:scale(.9); background:var(--green); border-color:var(--green); }
.task-row.done .btn-check { background:var(--green); border-color:var(--green); font-size:1.6rem; }

/* ══ CHECK PULSE ANIM ══ */
@keyframes checkPulse {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.12); }
  100% { transform:scale(1); }
}
.btn-check.pulse { animation:checkPulse .3s ease; }

/* ══ COMPLETION OVERLAY ══ */
#overlay-completion {
  position:fixed; inset:0;
  background:rgba(255,248,240,.97);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; cursor:pointer; padding:20px;
  animation:fadeIn .5s ease;
}
#overlay-completion.hidden { display:none; }

.completion-inner { display:flex; flex-direction:column; align-items:center; gap:16px; position:relative; }
.completion-title { font-size:clamp(2rem,7vw,3.2rem); font-weight:800; text-align:center; }
.completion-hint  { font-size:1rem; color:#CCC; margin-top:8px; }

.fox-wrap { width:min(220px,55vw); animation:foxBounce 1.1s ease-in-out infinite; }
@keyframes foxBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-22px); } }

.stars-wrap { position:absolute; inset:-80px; pointer-events:none; }
.star { position:absolute; font-size:clamp(1.3rem,4vw,2rem); animation:starPop var(--d) var(--dl) ease-in-out infinite; }
@keyframes starPop { 0%,100% { transform:translateY(0) scale(1); opacity:.6; } 50% { transform:translateY(-28px) scale(1.25); opacity:1; } }

/* ══ SETTINGS MODAL ══ */
#modal-settings {
  position:fixed; inset:0; background:rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:200; padding:24px;
}
#modal-settings.hidden { display:none; }
.modal-box { background:#fff; border-radius:28px; padding:32px 28px 24px; width:100%; max-width:360px; box-shadow:0 24px 64px rgba(0,0,0,.18); }
.modal-title { font-size:1.4rem; font-weight:800; margin-bottom:24px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid #F0F0F0; }
.setting-label { font-size:1.05rem; font-weight:500; }
.toggle { padding:10px 18px; border-radius:var(--r-sm); border:none; font-size:.95rem; font-weight:700; cursor:pointer; transition:all .15s; }
.toggle.on  { background:var(--green); color:var(--green-dk); }
.toggle.off { background:#EEE; color:#888; }
.weather-info { font-size:.8rem; color:#AAA; padding:8px 2px 2px; min-height:22px; }
.modal-section { margin-top:16px; padding-top:4px; border-top:2px solid #F0F0F0; }
.modal-section-title { font-size:.8rem; font-weight:700; color:#AAA; text-transform:uppercase; letter-spacing:.06em; padding:12px 0 4px; }
.btn-replan { width:100%; margin-top:12px; padding:14px; border-radius:var(--r-md); border:none; background:#E8EDF7; color:#4A6FA5; font-size:1rem; font-weight:700; cursor:pointer; }
.btn-replan:active { background:#D0D9EF; }
.btn-reset-evening { width:100%; margin-top:8px; padding:14px; border-radius:var(--r-md); border:none; background:#F7E8E8; color:#A54A4A; font-size:1rem; font-weight:700; cursor:pointer; }
.btn-reset-evening:active { background:#EFD0D0; }
.modal-close { margin-top:20px; width:100%; padding:16px; border-radius:var(--r-md); border:none; background:#F0F0F0; font-size:1.05rem; font-weight:700; color:#555; cursor:pointer; transition:background .15s; }
.modal-close:active { background:#E0E0E0; }

/* ══ PLAN SCREEN ══ */
#screen-plan {
  flex-direction:row; overflow:hidden; height:100dvh; height:100vh;
}

.plan-library {
  width:35%; padding:16px; overflow-y:auto;
  border-right:2px solid #F0E8DC; background:#FFF8F0;
  display:flex; flex-direction:column;
}
.plan-lib-title {
  font-size:.82rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--muted); margin:12px 0 8px;
}
.plan-lib-title:first-child { margin-top:0; }
.plan-lib-card {
  background:#fff; border-radius:var(--r-md); padding:12px;
  display:flex; align-items:center; gap:10px; box-shadow:var(--sh-s);
  cursor:grab; touch-action:none; margin-bottom:8px;
  border:3px solid transparent; transition:opacity .2s;
}
.plan-lib-card .card-emoji { font-size:2rem; flex-shrink:0; }
.plan-lib-card .card-info  { flex:1; }
.plan-lib-card .card-name  { font-size:.9rem; font-weight:600; }
.plan-lib-card .card-dur   { font-size:.75rem; color:var(--muted); }
.plan-lib-card.used        { opacity:.35; pointer-events:none; }
.plan-lib-card.locked      { opacity:.35; pointer-events:none; border-style:dashed; border-color:#CCC; }
@keyframes unlockPop {
  0%   { transform:scale(.9); opacity:.3; }
  100% { transform:scale(1);  opacity:1;  }
}

.plan-timeline-wrap {
  flex:1; display:flex; flex-direction:column; padding:16px; gap:10px; overflow:hidden;
}
.plan-tl-header {
  display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.plan-tl-title  { font-size:1.1rem; font-weight:700; }
.plan-free-label {
  font-size:.9rem; font-weight:600; color:var(--teal-dk);
  background:#EEF8F7; padding:4px 10px; border-radius:20px;
}
.plan-timeline {
  flex:1; background:#F8F4F0; border-radius:var(--r-md);
  overflow-y:auto; position:relative; min-height:100px;
  padding:6px 0;
}
.plan-timeline-empty {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:var(--muted); pointer-events:none; text-align:center; padding:20px;
}

.plan-block {
  border-radius:10px; padding:8px 10px; margin:3px 8px;
  display:flex; align-items:center; gap:8px; position:relative;
  cursor:grab; touch-action:none; transition:box-shadow .15s;
  box-sizing:border-box;
}
.plan-block.mandatory { background:linear-gradient(135deg,#9DD4CF,#7BBFBA); color:#1A3D3A; }
.plan-block.choice    { background:linear-gradient(135deg,#B5A8D5,#9A8BC4); color:#2A1A5A; }
.plan-block .block-emoji  { font-size:1.4rem; flex-shrink:0; }
.plan-block .block-name   { font-size:.88rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.plan-block .block-dur    { font-size:.75rem; opacity:.75; flex-shrink:0; }
.plan-block .block-remove {
  width:22px; height:22px; border-radius:50%; border:none;
  background:rgba(0,0,0,.18); color:white; font-size:.75rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  line-height:1; padding:0;
}
.plan-block .block-remove:active { background:rgba(0,0,0,.38); }
.plan-block.tl-dragging { opacity:.5; }

.plan-free-block {
  margin:3px 8px; border-radius:10px;
  background:repeating-linear-gradient(45deg,#E8F5F3,#E8F5F3 8px,#F0FAF8 8px,#F0FAF8 16px);
  display:flex; align-items:center; justify-content:center;
  font-size:.85rem; font-weight:600; color:var(--teal-dk); min-height:30px;
}

.plan-drop-indicator {
  height:4px; margin:0 8px; border-radius:2px;
  background:var(--teal); box-shadow:0 0 8px var(--teal); pointer-events:none;
}

.btn-letsgo {
  flex-shrink:0; padding:14px 20px; border-radius:var(--r-lg);
  border:none; background:linear-gradient(135deg,#A8D5B5,#6BB88A);
  color:#1A5E34; font-size:1.2rem; font-weight:800; cursor:pointer;
  box-shadow:var(--sh); transition:transform .15s;
}
.btn-letsgo:active { transform:scale(.96); }
.btn-letsgo.hidden { display:none; }

/* Portrait rotation hint */
.landscape-hint { display:none; }
@media (orientation:portrait) {
  #screen-plan .landscape-hint {
    display:flex; position:fixed; inset:0; background:rgba(255,248,240,.97);
    align-items:center; justify-content:center; flex-direction:column; gap:16px;
    z-index:300; font-size:1.4rem; font-weight:700; text-align:center; padding:32px;
  }
}
</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div id="screen-home" class="screen active">
  <div class="app-title">Was machen wir heute? 🌟</div>
  <div class="mode-card morning" onclick="showRoutine('morning')">
    <div class="mode-emoji">🌅</div>
    <div class="mode-label">Morgenroutine</div>
  </div>
  <div class="mode-card evening" onclick="showRoutine('evening')">
    <div class="mode-emoji">🌙</div>
    <div class="mode-label">Abendroutine</div>
  </div>
</div>

<!-- ══ ROUTINE SCREEN ══ -->
<div id="screen-routine" class="screen">
  <div class="routine-header">
    <button class="back-btn" onclick="showHome()">‹</button>
    <div class="time-display">
      <div class="time-track"><div class="time-fill" id="time-fill"></div></div>
      <div class="time-label" id="time-label">…</div>
    </div>
  </div>
  <div class="routine-body">
    <div id="task-list"></div>
  </div>
</div>

<!-- ══ PLAN SCREEN ══ -->
<div id="screen-plan" class="screen">
  <div class="plan-library" id="plan-library"></div>
  <div class="plan-timeline-wrap">
    <div class="plan-tl-header">
      <div class="plan-tl-title">19:25 – 21:00</div>
      <div class="plan-free-label" id="plan-free-label">⏱ … min frei</div>
    </div>
    <div class="plan-timeline" id="plan-timeline"></div>
    <button class="btn-letsgo hidden" id="btn-letsgo" onclick="finishPlanning()">Los geht's! 🚀</button>
  </div>
  <div class="landscape-hint">📱↔️<br>Bitte Tablet quer halten</div>
</div>

<!-- ══ COMPLETION OVERLAY ══ -->
<div id="overlay-completion" class="hidden" onclick="hideCompletion()">
  <div class="completion-inner">
    <div class="completion-title">Super gemacht!&nbsp;🎉</div>
    <div class="stars-wrap" id="stars-wrap"></div>
    <div class="fox-wrap" id="fox-wrap"></div>
    <div class="completion-hint">Antippen zum Weitermachen ✨</div>
  </div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div id="modal-settings" class="hidden" onclick="closeSettings()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">⚙️ Eltern-Einstellungen</div>
    <div class="setting-row">
      <span class="setting-label">☀️ Sonnencreme</span>
      <button id="btn-sunscreen" class="toggle on" onclick="toggleSunscreen()">Ein ☀️</button>
    </div>
    <div id="weather-info" class="weather-info"></div>
    <div class="modal-section">
      <div class="modal-section-title">🌙 Abend-Wahlaufgaben</div>
      <div id="choice-settings"></div>
      <button class="btn-replan" onclick="replan()">🔄 Abendroutine neu planen</button>
      <button class="btn-reset-evening" onclick="resetEvening()">↩️ Abendroutine zurücksetzen</button>
    </div>
    <button class="modal-close" onclick="closeSettings()">Fertig</button>
  </div>
</div>

<!-- ══ SETTINGS TRIGGER ══ -->
<button id="settings-btn" title="Lang drücken für Einstellungen">⚙️</button>

<script>
'use strict';

// ── TASK DEFINITIONS ─────────────────────────────────────────────

const TASKS = {
  morning: {
    deadline: { h:9, m:15 },
    mandatory: [
      { id:'pipi',      emoji:'🚽', label:'Pipi + Hände waschen', duration:5 },
      { id:'teeth',     emoji:'🦷', label:'Zähne putzen',          duration:5 },
      { id:'face',      emoji:'🧼', label:'Gesicht waschen',        duration:2 },
      { id:'dress',     emoji:'👕', label:'Anziehen',               duration:5 },
      { id:'sunscreen', emoji:'☀️', label:'Sonnencreme',            duration:5, conditional:true },
      { id:'go',        emoji:'🥾', label:'Jacke + Schuhe + Los!', duration:10, isLast:true },
    ],
    choice: [
      { id:'play', emoji:'🎲', label:'Spielen',    duration:15 },
      { id:'book', emoji:'📚', label:'Buch lesen', duration:15 },
    ],
  },
  evening: {
    deadline: { h:21, m:0 },
    mandatory: [
      { id:'feet',   emoji:'🦶', label:'Füße waschen',         duration:5 },
      { id:'warts',  emoji:'🩹', label:'Warzenversorgung',      duration:5 },
      { id:'teeth',  emoji:'🦷', label:'Zähne putzen',          duration:5 },
      { id:'face',   emoji:'🧼', label:'Gesicht waschen',        duration:2 },
      { id:'pipi',   emoji:'🚽', label:'Pipi + Hände waschen',  duration:5 },
      { id:'pyjama', emoji:'👚', label:'Schlafanzug anziehen',  duration:5 },
    ],
    choice: [
      { id:'episode',  emoji:'📺', label:'Folge schauen', duration:25 },
      { id:'readbook', emoji:'📖', label:'Vorlesen',       duration:15 },
      { id:'toben',    emoji:'🏃', label:'Toben',          duration:20 },
      { id:'play',     emoji:'🎲', label:'Spielen',        duration:15 },
    ],
  },
};

// ── STATE ────────────────────────────────────────────────────────

function newRoutine() {
  return { date:null, order:null, completed:[], globalStart:null, planDone:false };
}

function defaults() {
  return { sunscreenEnabled:true, weatherCheck:null, disabledChoices:[], morning:newRoutine(), evening:newRoutine() };
}

let state = (function () {
  try {
    const raw = localStorage.getItem('routinenapp');
    if (!raw) return defaults();
    const s = JSON.parse(raw);
    return {
      ...defaults(), ...s,
      morning: { ...newRoutine(), ...s.morning },
      evening: { ...newRoutine(), ...s.evening },
    };
  } catch { return defaults(); }
})();

function save() { localStorage.setItem('routinenapp', JSON.stringify(state)); }

function today() { return new Date().toISOString().split('T')[0]; }

function resetDaily() {
  const t = today();
  ['morning','evening'].forEach(m => {
    if (state[m].date !== t) {
      state[m] = { ...newRoutine(), date:t };
      state[m].order = getDefaultOrder(m);
    }
  });
  save();
}

// ── TASK HELPERS ─────────────────────────────────────────────────

function visibleMandatory(mode) {
  return TASKS[mode].mandatory.filter(t => !t.conditional || state.sunscreenEnabled);
}

function getAllTasks(mode) {
  const choice = TASKS[mode].choice.filter(t => !(state.disabledChoices||[]).includes(t.id));
  return [...visibleMandatory(mode), ...choice];
}

function getDefaultOrder(mode) {
  const mand    = visibleMandatory(mode);
  const nonLast = mand.filter(t => !t.isLast);
  const last    = mand.find(t => t.isLast);
  const choice  = TASKS[mode].choice;
  const ids     = [...nonLast.map(t => t.id), ...choice.map(t => t.id)];
  if (last) ids.push(last.id);
  return ids;
}

// Keep order in sync when sunscreen toggle changes task visibility
function syncOrder(mode) {
  const ms     = state[mode];
  const allIds = getAllTasks(mode).map(t => t.id);
  const lastId = TASKS[mode].mandatory.find(t => t.isLast)?.id;

  if (!ms.order) { ms.order = getDefaultOrder(mode); return; }

  // Remove tasks no longer visible
  ms.order = ms.order.filter(id => allIds.includes(id));

  // Add newly visible tasks (insert before lastId, or append)
  for (const id of allIds) {
    if (!ms.order.includes(id)) {
      if (lastId && ms.order.includes(lastId)) {
        ms.order.splice(ms.order.indexOf(lastId), 0, id);
      } else {
        ms.order.push(id);
      }
    }
  }

  // Ensure lastId stays last
  if (lastId && ms.order.includes(lastId)) {
    ms.order = ms.order.filter(id => id !== lastId);
    ms.order.push(lastId);
  }
}

function getTotalMin(mode) {
  const ms  = state[mode];
  const all = getAllTasks(mode);
  return (ms.order || []).reduce((sum, id) => {
    const t = all.find(x => x.id === id);
    return sum + (t?.duration ?? 0);
  }, 0);
}

function getElapsedMin(mode) {
  const gs = state[mode]?.globalStart;
  return gs ? (Date.now() - gs) / 60000 : 0;
}

function allMandatoryDone(mode) {
  return visibleMandatory(mode).every(t => state[mode].completed.includes(t.id));
}

// ── NAVIGATION ───────────────────────────────────────────────────

let currentMode = null;
let timeIv      = null;

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() {
  clearInterval(timeIv); timeIv = null;
  currentMode = null;
  switchScreen('screen-home');
}

function showRoutine(mode) {
  currentMode = mode;
  resetDaily();
  if (mode === 'evening' && !state.evening.planDone) { showPlan('evening'); return; }
  if (!state[mode].order) { state[mode].order = getDefaultOrder(mode); save(); }
  renderRoutine();
  switchScreen('screen-routine');
  updateTimeDisplay();
  timeIv = setInterval(updateTimeDisplay, 30000);
  checkWeather();
}

// ── RENDER ───────────────────────────────────────────────────────

function renderRoutine() {
  const mode = currentMode;
  const ms   = state[mode];
  const all  = getAllTasks(mode);
  const list = document.getElementById('task-list');

  const order = ms.order || getDefaultOrder(mode);

  list.innerHTML = order.map(id => {
    const t = all.find(x => x.id === id);
    if (!t) return '';
    return renderRow(t, ms);
  }).join('');

  initDrag(list);
}

function renderRow(t, ms) {
  const done   = ms.completed.includes(t.id);
  const isLast = !!t.isLast;

  let rowCls = 'task-row';
  if (done)   rowCls += ' done';
  if (isLast && !done) rowCls += ' last-step';

  const handle = `<div class="drag-handle">⠿</div>`;

  const tag = (isLast && !done)
    ? `<span class="task-tag">Letzter Schritt</span>`
    : '';

  const content = `<div class="task-content">
    <div class="task-emoji-big">${t.emoji}</div>
    <div class="task-name">${t.label}</div>
    <div class="task-dur">${t.duration}&nbsp;min</div>
    ${tag}
  </div>`;

  const checkInner = done ? '✅' : '✓';
  const checkBtn = done
    ? `<button class="btn-check" onclick="unfinishTask('${t.id}')">✅</button>`
    : `<button class="btn-check" onclick="finishTask('${t.id}')">✓</button>`;

  return `<div class="${rowCls}" data-id="${t.id}"${isLast ? ' data-last="true"' : ''}>
  ${handle}${content}${checkBtn}
</div>`;
}

// ── TIME DISPLAY ─────────────────────────────────────────────────

function updateTimeDisplay() {
  if (!currentMode) return;
  const total   = getTotalMin(currentMode);
  const elapsed = getElapsedMin(currentMode);

  const fill  = document.getElementById('time-fill');
  const label = document.getElementById('time-label');
  if (!fill || !label) return;

  if (!state[currentMode].globalStart) {
    fill.style.width = '0%';
    label.textContent = `${total} min geplant`;
    fill.classList.remove('over');
    return;
  }

  const pct = total > 0 ? (elapsed / total) * 100 : 0;
  fill.style.width = Math.min(pct, 100) + '%';
  fill.classList.toggle('over', pct > 100);
  label.textContent = `${Math.round(elapsed)} / ${total} min`;
}

// ── TASK ACTIONS ─────────────────────────────────────────────────

function finishTask(id) {
  const mode = currentMode;
  const ms   = state[mode];

  // Set global start on first task
  if (!ms.globalStart) { ms.globalStart = Date.now(); }

  ms.completed.push(id);
  save();

  // Pulse animation on the button
  const row = document.querySelector(`.task-row[data-id="${id}"]`);
  if (row) {
    const btn = row.querySelector('.btn-check');
    if (btn) { btn.classList.add('pulse'); setTimeout(() => btn.classList.remove('pulse'), 300); }
  }

  if (allMandatoryDone(mode)) {
    setTimeout(() => showCompletion(), 400);
    return;
  }

  setTimeout(() => {
    renderRoutine();
    updateTimeDisplay();
  }, 320);
}

function unfinishTask(id) {
  const ms = state[currentMode];
  ms.completed = ms.completed.filter(x => x !== id);
  save();
  renderRoutine();
  updateTimeDisplay();
}

// ── PLAN SCREEN ──────────────────────────────────────────────────

const EVENING_TOTAL_MIN = 95;   // 19:25 – 21:00
const TIMELINE_SCALE    = 6.4;  // px per minute
const BLOCK_MIN_H       = 44;   // px minimum block height

let planOrder = [];   // task IDs currently in timeline
let planDrag  = null; // active drag state

function blockH(durationMin) {
  return Math.max(BLOCK_MIN_H, durationMin * TIMELINE_SCALE);
}

function getPlannedMin() {
  const all = getAllTasks('evening');
  return planOrder.reduce((s, id) => {
    const t = all.find(x => x.id === id);
    return s + (t?.duration ?? 0);
  }, 0);
}

function showPlan(mode) {
  planOrder = [];
  renderPlanLibrary(mode);
  initPlanLibDrag(document.getElementById('plan-library'));
  renderPlanTimeline(mode);
  initPlanTimelineDrag(document.getElementById('plan-timeline'));
  updateFreeTimeLabel();
  switchScreen('screen-plan');
  try { screen.orientation.lock('landscape').catch(() => {}); } catch (e) {}
}

function renderPlanLibrary(mode) {
  const lib = document.getElementById('plan-library');
  const mandatory = visibleMandatory(mode);
  const choice    = TASKS[mode].choice.filter(t => !(state.disabledChoices||[]).includes(t.id));
  const allMandatoryPlaced = mandatory.every(t => planOrder.includes(t.id));

  let html = `<div class="plan-lib-title">Pflicht</div>`;
  mandatory.forEach(t => {
    const used = planOrder.includes(t.id);
    html += `<div class="plan-lib-card${used ? ' used' : ''}" data-id="${t.id}" data-type="mandatory">
      <div class="card-emoji">${t.emoji}</div>
      <div class="card-info">
        <div class="card-name">${t.label}</div>
        <div class="card-dur">${t.duration} min</div>
      </div>
    </div>`;
  });

  html += `<div class="plan-lib-title" style="margin-top:16px">Wahl</div>`;
  choice.forEach(t => {
    const used   = planOrder.includes(t.id);
    const locked = !allMandatoryPlaced && !used;
    html += `<div class="plan-lib-card${used ? ' used' : locked ? ' locked' : ''}" data-id="${t.id}" data-type="choice">
      <div class="card-emoji">${t.emoji}</div>
      <div class="card-info">
        <div class="card-name">${t.label}</div>
        <div class="card-dur">${t.duration} min</div>
      </div>
    </div>`;
  });

  lib.innerHTML = html;
}

function renderPlanTimeline() {
  const tl      = document.getElementById('plan-timeline');
  const all     = getAllTasks('evening');
  const freeMin = EVENING_TOTAL_MIN - getPlannedMin();

  if (!planOrder.length) {
    tl.innerHTML = '<div class="plan-timeline-empty" id="plan-timeline-empty">← Aufgaben hierher ziehen</div>';
    return;
  }

  let html = '';
  planOrder.forEach(id => {
    const t     = all.find(x => x.id === id);
    if (!t) return;
    const h     = blockH(t.duration);
    const type  = TASKS.evening.mandatory.some(m => m.id === id) ? 'mandatory' : 'choice';
    html += `<div class="plan-block ${type}" data-id="${id}" style="height:${h}px">
      <span class="block-emoji">${t.emoji}</span>
      <span class="block-name">${t.label}</span>
      <span class="block-dur">${t.duration} min</span>
      <button class="block-remove" onclick="removeFromTimeline('${id}')">✕</button>
    </div>`;
  });

  if (freeMin > 0) {
    const h = Math.max(30, freeMin * TIMELINE_SCALE);
    html += `<div class="plan-free-block" style="height:${h}px">✨ ${Math.round(freeMin)} min frei</div>`;
  }

  tl.innerHTML = html;
}

function updateFreeTimeLabel() {
  const freeMin = EVENING_TOTAL_MIN - getPlannedMin();
  const label   = document.getElementById('plan-free-label');
  if (label) label.textContent = `⏱ ${Math.max(0, Math.round(freeMin))} min frei`;
}

function checkUnlockChoice() {
  const mandatory     = visibleMandatory('evening');
  const allPlaced     = mandatory.every(t => planOrder.includes(t.id));
  const letsgoBtn     = document.getElementById('btn-letsgo');
  if (letsgoBtn) letsgoBtn.classList.toggle('hidden', !allPlaced);

  // Re-render library to unlock/lock choice cards
  renderPlanLibrary('evening');
}

function removeFromTimeline(taskId) {
  const idx = planOrder.indexOf(taskId);
  if (idx !== -1) planOrder.splice(idx, 1);
  renderPlanTimeline();
  updateFreeTimeLabel();
  checkUnlockChoice();
}

function insertIntoTimeline(taskId, beforeIndex) {
  // Remove if already present (reorder)
  const existing = planOrder.indexOf(taskId);
  if (existing !== -1) planOrder.splice(existing, 1);

  let insertAt = beforeIndex;
  if (existing !== -1 && existing < beforeIndex) insertAt--;
  insertAt = Math.max(0, Math.min(insertAt, planOrder.length));
  planOrder.splice(insertAt, 0, taskId);

  renderPlanTimeline();
  updateFreeTimeLabel();
  checkUnlockChoice();
}

function getDropIndex(tl, yClient) {
  const blocks = [...tl.querySelectorAll('.plan-block')];
  for (let i = 0; i < blocks.length; i++) {
    const rect = blocks[i].getBoundingClientRect();
    if (yClient < rect.top + rect.height / 2) return i;
  }
  return blocks.length;
}

// ── PLAN DRAG: Library card → Timeline ───────────────────────────

function initPlanLibDrag(lib) {
  lib.addEventListener('pointerdown', e => {
    const card = e.target.closest('.plan-lib-card');
    if (!card || card.classList.contains('used') || card.classList.contains('locked')) return;

    const taskId = card.dataset.id;
    e.preventDefault();

    // Create ghost
    const rect  = card.getBoundingClientRect();
    const ghost = card.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;
      width:${rect.width}px;opacity:.85;pointer-events:none;z-index:500;
      border-radius:var(--r-md);box-shadow:0 8px 24px rgba(0,0,0,.25);
      background:#fff;display:flex;align-items:center;gap:10px;padding:12px;`;
    document.body.appendChild(ghost);
    card.style.opacity = '0.3';

    const offsetX = e.clientX - rect.left;
    const offsetY = e.clientY - rect.top;

    planDrag = { type:'from-lib', taskId, ghost, card, offsetX, offsetY, dropIndicator:null };

    document.addEventListener('pointermove', onPlanMove, { passive:false });
    document.addEventListener('pointerup',   onPlanUp);
    document.addEventListener('pointercancel', onPlanCancel);
  });
}

// ── PLAN DRAG: Reorder inside Timeline ───────────────────────────

function initPlanTimelineDrag(tl) {
  tl.addEventListener('pointerdown', e => {
    const block = e.target.closest('.plan-block');
    if (!block || e.target.classList.contains('block-remove')) return;

    const taskId = block.dataset.id;
    e.preventDefault();

    const rect  = block.getBoundingClientRect();
    const ghost = block.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;
      width:${rect.width}px;height:${rect.height}px;opacity:.85;pointer-events:none;z-index:500;
      border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);`;
    document.body.appendChild(ghost);
    block.classList.add('tl-dragging');

    const offsetX = e.clientX - rect.left;
    const offsetY = e.clientY - rect.top;

    planDrag = { type:'reorder', taskId, ghost, block, offsetX, offsetY, dropIndicator:null };

    document.addEventListener('pointermove', onPlanMove, { passive:false });
    document.addEventListener('pointerup',   onPlanUp);
    document.addEventListener('pointercancel', onPlanCancel);
  });
}

function onPlanMove(e) {
  if (!planDrag) return;
  e.preventDefault();

  const { ghost, offsetX, offsetY } = planDrag;
  ghost.style.left = (e.clientX - offsetX) + 'px';
  ghost.style.top  = (e.clientY - offsetY) + 'px';

  // Remove old indicator
  if (planDrag.dropIndicator) { planDrag.dropIndicator.remove(); planDrag.dropIndicator = null; }

  const tl = document.getElementById('plan-timeline');
  const tlRect = tl.getBoundingClientRect();

  if (e.clientX >= tlRect.left && e.clientX <= tlRect.right &&
      e.clientY >= tlRect.top  && e.clientY <= tlRect.bottom) {
    const idx = getDropIndex(tl, e.clientY);
    const blocks = [...tl.querySelectorAll('.plan-block')];
    const indicator = document.createElement('div');
    indicator.className = 'plan-drop-indicator';
    planDrag.dropIndicator = indicator;
    if (idx < blocks.length) {
      tl.insertBefore(indicator, blocks[idx]);
    } else {
      const freeBlock = tl.querySelector('.plan-free-block');
      if (freeBlock) tl.insertBefore(indicator, freeBlock);
      else tl.appendChild(indicator);
    }
  }
}

function onPlanUp(e) {
  if (!planDrag) return;

  const tl     = document.getElementById('plan-timeline');
  const tlRect = tl.getBoundingClientRect();
  const { taskId, type, ghost, card, block } = planDrag;

  // Cleanup ghost + indicator
  ghost.remove();
  if (planDrag.dropIndicator) planDrag.dropIndicator.remove();
  if (type === 'from-lib' && card) card.style.opacity = '';
  if (type === 'reorder'  && block) block.classList.remove('tl-dragging');

  const overTimeline = e.clientX >= tlRect.left && e.clientX <= tlRect.right &&
                       e.clientY >= tlRect.top  && e.clientY <= tlRect.bottom;

  // Re-read blocks BEFORE insert (indicator was removed)
  if (overTimeline) {
    const dropIdx = getDropIndex(tl, e.clientY);
    insertIntoTimeline(taskId, dropIdx);
  } else if (type === 'reorder') {
    // Dropped outside — remove from timeline
    removeFromTimeline(taskId);
  } else {
    // Cancelled lib drag — just re-render library to restore opacity
    renderPlanLibrary('evening');
  }

  cleanupPlanDrag();
}

function onPlanCancel() {
  if (!planDrag) return;
  const { ghost, card, block, dropIndicator } = planDrag;
  ghost.remove();
  if (dropIndicator) dropIndicator.remove();
  if (card)  card.style.opacity = '';
  if (block) block.classList.remove('tl-dragging');
  renderPlanLibrary('evening');
  renderPlanTimeline();
  cleanupPlanDrag();
}

function cleanupPlanDrag() {
  planDrag = null;
  document.removeEventListener('pointermove', onPlanMove);
  document.removeEventListener('pointerup',   onPlanUp);
  document.removeEventListener('pointercancel', onPlanCancel);
}

function finishPlanning() {
  try { screen.orientation.unlock(); } catch (e) {}
  state.evening.order    = [...planOrder];
  state.evening.planDone = true;
  save();
  showRoutine('evening');
}

// ── DRAG & DROP ──────────────────────────────────────────────────

let dragState = null;

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const { listEl, el } = dragState;
  const y = e.clientY;

  const siblings = [...listEl.querySelectorAll('.task-row:not(.dragging)')]
    .filter(r => r.dataset.last !== 'true');
  const lastRow = listEl.querySelector('.task-row[data-last="true"]');

  let insertBefore = null;
  for (const r of siblings) {
    const rect = r.getBoundingClientRect();
    if (y < rect.top + rect.height / 2) { insertBefore = r; break; }
  }

  if (insertBefore)       listEl.insertBefore(el, insertBefore);
  else if (lastRow)       listEl.insertBefore(el, lastRow);
  else                    listEl.appendChild(el);
}

function onDragEnd() {
  if (!dragState) return;
  dragState.el.classList.remove('dragging');

  // Save new order from DOM
  const newOrder = [...dragState.listEl.querySelectorAll('.task-row')].map(r => r.dataset.id);
  state[currentMode].order = newOrder;
  save();

  cleanupDrag();
}

function onDragCancel() {
  if (!dragState) return;
  dragState.el.classList.remove('dragging');
  cleanupDrag();
  renderRoutine(); // restore saved order
}

function cleanupDrag() {
  dragState = null;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragEnd);
  document.removeEventListener('pointercancel', onDragCancel);
}

function initDrag(listEl) {
  listEl.addEventListener('pointerdown', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const row = handle.closest('.task-row');
    if (!row || row.dataset.last === 'true' || row.classList.contains('done')) return;

    e.preventDefault();
    row.classList.add('dragging');
    dragState = { listEl, el: row };

    document.addEventListener('pointermove',   onDragMove,   { passive:false });
    document.addEventListener('pointerup',     onDragEnd);
    document.addEventListener('pointercancel', onDragCancel);
  });
}

// ── SETTINGS ─────────────────────────────────────────────────────

function openSettings() {
  const btn = document.getElementById('btn-sunscreen');
  btn.textContent = state.sunscreenEnabled ? 'Ein ☀️' : 'Aus';
  btn.className   = `toggle ${state.sunscreenEnabled ? 'on' : 'off'}`;

  const wc = state.weatherCheck;
  const wi = document.getElementById('weather-info');
  if (wc) {
    const t = new Date(wc.ts).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
    wi.textContent = `Check: ${t} · UV ${wc.uv ?? '?'} · Sonne ${Math.round((wc.sun||0)/3600)}h · ${wc.auto ? 'auto' : 'manuell'}`;
  } else {

  }

  const disabled = state.disabledChoices || [];
  document.getElementById('choice-settings').innerHTML = TASKS.evening.choice.map(t => {
    const on = !disabled.includes(t.id);
    return `<div class="setting-row">
      <span class="setting-label">${t.emoji} ${t.label}</span>
      <button class="toggle ${on ? 'on' : 'off'}" onclick="toggleChoice('${t.id}')">${on ? 'Ein' : 'Aus'}</button>

  document.getElementById('modal-settings').classList.remove('hidden');

function closeSettings() {
  document.getElementById('modal-settings').classList.add('hidden');
}

function toggleChoice(id) {
  const arr = state.disabledChoices || [];
  const idx = arr.indexOf(id);
  if (idx === -1) arr.push(id);
  else arr.splice(idx, 1);
  state.disabledChoices = arr;
  syncOrder('evening');
  save();
  openSettings();
}

function replan() {
  closeSettings();
  state.evening.planDone  = false;
  state.evening.order     = null;
  state.evening.completed = [];
  save();
  showPlan('evening');
}

function resetEvening() {
  closeSettings();
  state.evening.completed  = [];
  state.evening.globalStart = null;
  save();
  if (currentMode === 'evening') renderRoutine();
}

function toggleSunscreen() {
  state.sunscreenEnabled = !state.sunscreenEnabled;
  if (state.weatherCheck) state.weatherCheck.auto = false;
  syncOrder('morning'); // sunscreen only exists in morning

  const btn = document.getElementById('btn-sunscreen');
  btn.textContent = state.sunscreenEnabled ? 'Ein ☀️' : 'Aus';

// ── WEATHER ──────────────────────────────────────────────────────

async function checkWeather() {
  if (new Date().getHours() < 6) return;
  if (state.weatherCheck?.date === today()) return;
  try {
    const url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude=54.133&longitude=10.624' +
      '&daily=uv_index_max,sunshine_duration' +
      '&timezone=Europe%2FBerlin&forecast_days=1';
    const r = await fetch(url, { cache:'no-cache' });
    if (!r.ok) return;
    const d   = await r.json();
    const uv  = d.daily.uv_index_max?.[0]      ?? 0;
    const sun = d.daily.sunshine_duration?.[0] ?? 0;
    state.sunscreenEnabled = uv >= 3 || sun > 14400;
    state.weatherCheck = { date:today(), uv, sun, auto:true, ts:Date.now() };
    syncOrder('morning');
    save();
    if (currentMode) { renderRoutine(); updateTimeDisplay(); }
  } catch { /* offline */ }
}

// ── INIT ─────────────────────────────────────────────────────────

resetDaily();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
