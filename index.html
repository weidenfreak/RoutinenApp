<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F9B84B">
<link rel="manifest" href="manifest.json">
<title>Routinen</title>
<style>
:root {
  --blue:     #DEF1FF;
  --yellow:   #FFF5B6;
  --lime:     #BEEB6C;
  --peach:    #FFB7A9;
  --pink:     #FFB1B1;
  --text:     #5C5C5C;
  --muted:    #999;
  --cream:    #F0F8FF;
  --teal:     #BEEB6C;
  --teal-dk:  #5A8B1A;
  --amber:    #FFD06B;
  --green:    #BEEB6C;
  --green-dk: #4A7A0A;
  --r-lg: 24px;
  --r-md: 16px;
  --r-sm: 12px;
  --sh:   0 4px 16px rgba(0,0,0,.08);
  --sh-s: 0 2px 8px  rgba(0,0,0,.06);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

html, body { height:100%; font-family: system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--cream); color:var(--text); }

/* ══ SCREENS ══ */
.screen { display:none; flex-direction:column; min-height:100dvh; min-height:100vh; }
.screen.active { display:flex; animation:fadeIn .25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ══ HOME ══ */
#screen-home {
  align-items:stretch; justify-content:center;
  padding:40px 24px 80px; gap:20px;
  background:var(--blue);
}
.app-title { text-align:center; font-size:clamp(1.5rem,5vw,2.2rem); font-weight:800; margin-bottom:8px; }

.mode-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; padding:40px 20px;
  border-radius:var(--r-lg); border:none; cursor:pointer;
  box-shadow:var(--sh); color:white; position:relative; overflow:hidden;
  transition:transform .15s ease;
}
.mode-card::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background .15s; }
.mode-card:active { transform:scale(.97); }
.mode-card:active::after { background:rgba(255,255,255,.15); }
.mode-card.morning { background:linear-gradient(135deg,#F9B84B 0%,#F07A30 100%); }
.mode-card.morning.disabled { background:#CCC; opacity:.5; cursor:not-allowed; pointer-events:none; }
.mode-card.evening { background:linear-gradient(135deg,#7B9FD4 0%,#4A6FA5 100%); }
.mode-emoji { font-size:clamp(3.5rem,11vw,5.5rem); line-height:1; }
.mode-label { font-size:clamp(1.4rem,4.5vw,2.1rem); font-weight:700; }

/* ══ SETTINGS BUTTON ══ */
#settings-btn {
  position:fixed; bottom:18px; right:18px;
  width:44px; height:44px; border-radius:50%; border:none;
  background:rgba(0,0,0,.06); font-size:1.3rem; cursor:pointer;
  opacity:.3; display:flex; align-items:center; justify-content:center;
  z-index:50; transition:opacity .2s;
}
#settings-btn:hover { opacity:.55; }

/* ══ ROUTINE HEADER ══ */
.routine-header {
  position:sticky; top:0;
  display:flex; flex-direction:column; gap:0;
  background:var(--yellow); box-shadow:0 3px 14px rgba(0,0,0,.08);
  z-index:20;
}
.routine-header-top {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px 10px;
}
.back-btn {
  width:48px; height:48px; border-radius:var(--r-sm); border:none;
  background:rgba(0,0,0,.06); font-size:1.8rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .15s;
}
.back-btn:active { background:#E0E0E0; }

/* ══ TIME DISPLAY (Morgen) ══ */
.time-display { flex:1; display:flex; flex-direction:column; gap:4px; }
.time-track { height:14px; background:rgba(0,0,0,.08); border-radius:7px; overflow:hidden; }
.time-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--teal),#5BB8B0);
  border-radius:7px; transition:width .8s ease;
}
.time-fill.over { background:linear-gradient(90deg,var(--amber),#F4A942); }
.time-label { font-size:.82rem; font-weight:700; color:var(--muted); text-align:right; }

/* ══ BUDGET BAR (Abend) ══ */
.budget-wrap { width:100%; padding:0 0 12px; }
.budget-bar {
  height:52px; background:#E0E0E0; overflow:hidden; display:flex;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.10);
}
.budget-seg { height:100%; transition:width .8s ease; min-width:0; flex-shrink:0; }
.budget-done      { background:linear-gradient(180deg,#D4F590,#BEEB6C); }
.budget-mandatory { background:linear-gradient(180deg,#EEF8FF,#DEF1FF); }
.budget-choice    { background:linear-gradient(180deg,#FFFBE0,#FFF5B6); }
.budget-labels {
  display:flex; justify-content:space-between;
  font-size:.9rem; font-weight:800; color:#555;
  padding:6px 14px 0;
}

/* ══ CHOICE SECTION ══ */
.choice-section { background:var(--yellow); border-radius:var(--r-md); box-shadow:var(--sh-s); padding:16px; }
.choice-section-label { font-size:.72rem; font-weight:700; color:rgba(0,0,0,.45); text-transform:uppercase; letter-spacing:.07em; margin-bottom:10px; }
.choice-chips { display:flex; flex-wrap:wrap; gap:8px; }
.choice-chip { padding:14px 18px; border-radius:var(--r-sm); border:2px solid rgba(0,0,0,.12); background:rgba(255,255,255,.55); font-size:1rem; font-weight:700; cursor:pointer; transition:all .15s; color:var(--text); }
.choice-chip.active { background:rgba(255,255,255,.8); border-color:rgba(0,0,0,.2); }
.choice-chip:active { transform:scale(.95); }
.choice-swap-row { display:flex; gap:8px; padding:8px 0 2px; flex-wrap:wrap; }
.choice-swap-btn { padding:8px 16px; border-radius:20px; border:1.5px solid rgba(0,0,0,.15); background:rgba(255,255,255,.5); font-size:.9rem; cursor:pointer; color:var(--text); font-weight:600; }
.choice-swap-btn:active { background:rgba(255,255,255,.7); }
.task-tag.choice-tag { background:rgba(0,0,0,.1); color:rgba(0,0,0,.6); }

/* ══ ROUTINE BODY ══ */
.routine-body { padding:16px; display:flex; flex-direction:column; gap:10px; flex:1; }

/* ══ TASK LIST ══ */
#task-list { display:flex; flex-direction:column; gap:10px; }

.task-row {
  display:flex; align-items:center;
  background:var(--blue);
  border-radius:var(--r-md);
  box-shadow:var(--sh-s); min-height:80px;
  border:3px solid transparent;
  transition:opacity .2s, transform .15s, box-shadow .15s;
  overflow:hidden;
}
.task-row.done {
  opacity:.5;
  background:var(--blue);
}
.task-row[data-choice="true"]:not(.done) {
  background:var(--yellow);
}
.task-row[data-choice="true"].done {
  background:var(--yellow);
}

.task-row[data-id="toben"]:not(.done) {
  background:var(--peach);
}
.task-row.last-step { border-color:rgba(0,0,0,.12); }
.task-row.dragging {
  opacity:.55; transform:scale(.98);
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  z-index:10;
}

.drag-handle {
  width:56px; align-self:stretch; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; color:rgba(0,0,0,.25); cursor:grab;
  touch-action:none;
  user-select:none;
}
.task-row.done .drag-handle { visibility:hidden; }
.task-row.last-step .drag-handle { visibility:hidden; }
.task-row[data-follows] .drag-handle { visibility:hidden; }

.task-content { flex:1; padding:14px 4px; min-width:0; display:flex; align-items:center; gap:14px; }
.task-emoji-big { font-size:clamp(3rem,11vw,4rem); line-height:1; flex-shrink:0; background:rgba(255,255,255,.65); border-radius:50%; width:1.8em; height:1.8em; display:flex; align-items:center; justify-content:center; }
.task-text-group { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; min-width:0; }
.task-name { font-size:clamp(.95rem,2.8vw,1.15rem); font-weight:700; line-height:1.25; color:var(--text); }
.task-row[data-choice="true"] .task-name { color:var(--text); }
.task-row.done .task-name { color:var(--text); }
.task-dur  { font-size:.8rem; color:rgba(0,0,0,.45); white-space:nowrap; }
.task-tag  { display:inline-block; font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px; margin-top:3px; background:rgba(0,0,0,.1); color:rgba(0,0,0,.6); }

.btn-check {
  width:72px; height:72px; margin:4px 8px 4px 4px; flex-shrink:0;
  border-radius:50%; border:3px solid var(--lime);
  background:rgba(255,255,255,.55); font-size:1.8rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; font-weight:700;
}
.btn-check:active { transform:scale(.9); background:var(--lime); }
.task-row.done .btn-check { background:var(--lime); border-color:var(--lime); font-size:1.6rem; }

/* ══ CHECK PULSE ANIM ══ */
@keyframes checkPulse {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.12); }
  100% { transform:scale(1); }
}
.btn-check.pulse { animation:checkPulse .3s ease; }

/* ══ FOX BUDDY ══ */
#fox-buddy {
  position:fixed; top:6px; right:10px;
  display:flex; flex-direction:column; align-items:center;
  z-index:60; pointer-events:none;
}
.fox-bubble {
  position:relative;
  background:#fff; border:2.5px solid #F9B84B;
  border-radius:14px; padding:8px 14px;
  font-size:1.6rem; text-align:center; line-height:1.2;
  box-shadow:0 2px 10px rgba(0,0,0,.13);
  margin-top:8px;
  opacity:0; transform:translateY(-6px) scale(.88);
  transition:opacity .22s, transform .22s;
}
.fox-bubble.visible { opacity:1; transform:translateY(0) scale(1); }
.fox-bubble::after {
  content:''; position:absolute; top:-9px; left:50%;
  transform:translateX(-50%);
  border:5px solid transparent; border-bottom-color:#F9B84B;
}
#fox-svg { animation:foxBob 3.5s ease-in-out infinite; transform-origin:bottom center; display:block; overflow:visible; }
#fox-svg.wave  { animation:foxWave  .55s ease-in-out 3 forwards; }
#fox-svg.cheer { animation:foxCheer .45s ease-in-out 4 forwards; }
@keyframes foxBob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes foxWave  { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-14deg) translateY(-3px)} 75%{transform:rotate(14deg) translateY(-3px)} }
@keyframes foxCheer { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-18px) scale(1.15)} 70%{transform:translateY(-8px) scale(1.07)} }

/* ══ CONFETTI ══ */
@keyframes confettiFly {
  0%   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
  100% { transform:translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0.4); opacity:0; }
}
.confetti-piece {
  position:fixed;
  width:8px; height:8px;
  border-radius:2px;
  pointer-events:none;
  z-index:9999;
  animation:confettiFly var(--cd) ease-out forwards;
}

/* ══ CHOICE PICK OVERLAY ══ */
#overlay-choice-pick {
  position:fixed; inset:0;
  background:linear-gradient(160deg,var(--yellow),var(--blue));
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; padding:24px 20px;
  animation:fadeIn .4s ease;
}
#overlay-choice-pick.hidden { display:none; }
.choice-pick-inner { display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; max-width:420px; }
.choice-pick-fox   { width:min(110px,28vw); animation:foxBounce 1.1s ease-in-out infinite; }
.choice-pick-title { font-size:clamp(2rem,7vw,3rem); font-weight:800; text-align:center; }
.choice-pick-label { font-size:clamp(.9rem,2.8vw,1.1rem); font-weight:700; color:#888; text-align:center; }
.choice-pick-options { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; width:100%; margin-top:4px; }
.choice-pick-btn {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:22px 26px; border-radius:22px;
  border:3px solid rgba(0,0,0,.08);
  background:var(--yellow);
  box-shadow:0 4px 18px rgba(0,0,0,.12);
  cursor:pointer; transition:transform .1s, box-shadow .12s;
  color:var(--text); font-weight:800; min-width:110px;
}
.choice-pick-btn:active { transform:scale(.93); box-shadow:0 2px 8px rgba(100,60,180,.15); }
.choice-pick-emoji { font-size:clamp(2.4rem,9vw,3.4rem); line-height:1; }
.choice-pick-name  { font-size:clamp(.8rem,2.5vw,.95rem); text-align:center; }

/* ══ COMPLETION OVERLAY ══ */
#overlay-completion {
  position:fixed; inset:0;
  background:rgba(255,248,240,.97);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; cursor:pointer; padding:20px;
  animation:fadeIn .5s ease;
}
#overlay-completion.hidden { display:none; }

.completion-inner { display:flex; flex-direction:column; align-items:center; gap:16px; position:relative; }
.completion-title { font-size:clamp(2rem,7vw,3.2rem); font-weight:800; text-align:center; }
.completion-hint  { font-size:1rem; color:#CCC; margin-top:8px; }

.fox-wrap { width:min(130px,33vw); animation:foxBounce 1.1s ease-in-out infinite; }
@keyframes foxBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-22px); } }

.stars-wrap { position:absolute; inset:-80px; pointer-events:none; }
.star { position:absolute; font-size:clamp(1.3rem,4vw,2rem); animation:starPop var(--d) var(--dl) ease-in-out infinite; }
@keyframes starPop { 0%,100% { transform:translateY(0) scale(1); opacity:.6; } 50% { transform:translateY(-28px) scale(1.25); opacity:1; } }

/* ══ SETTINGS MODAL ══ */
#modal-settings {
  position:fixed; inset:0; background:rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:200; padding:24px;
}
#modal-settings.hidden { display:none; }
.modal-box { background:#fff; border-radius:28px; padding:32px 28px 24px; width:100%; max-width:360px; box-shadow:0 24px 64px rgba(0,0,0,.18); }
.modal-title { font-size:1.4rem; font-weight:800; margin-bottom:24px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid #F0F0F0; }
.setting-label { font-size:1.05rem; font-weight:500; }
.toggle { padding:10px 18px; border-radius:var(--r-sm); border:none; font-size:.95rem; font-weight:700; cursor:pointer; transition:all .15s; }
.toggle.on  { background:var(--green); color:var(--green-dk); }
.toggle.off { background:#EEE; color:#888; }
.weather-info { font-size:.8rem; color:#AAA; padding:8px 2px 2px; min-height:22px; }
.modal-section { margin-top:16px; padding-top:4px; border-top:2px solid #F0F0F0; }
.modal-section-title { font-size:.8rem; font-weight:700; color:#AAA; text-transform:uppercase; letter-spacing:.06em; padding:12px 0 4px; }
.btn-replan { width:100%; margin-top:12px; padding:14px; border-radius:var(--r-md); border:none; background:#E8EDF7; color:#4A6FA5; font-size:1rem; font-weight:700; cursor:pointer; }
.btn-replan:active { background:#D0D9EF; }
.btn-reset-evening { width:100%; margin-top:8px; padding:14px; border-radius:var(--r-md); border:none; background:#F7E8E8; color:#A54A4A; font-size:1rem; font-weight:700; cursor:pointer; }
.btn-reset-evening:active { background:#EFD0D0; }
.modal-close { margin-top:20px; width:100%; padding:16px; border-radius:var(--r-md); border:none; background:#F0F0F0; font-size:1.05rem; font-weight:700; color:#555; cursor:pointer; transition:background .15s; }
.modal-close:active { background:#E0E0E0; }

/* ══ PLAN SCREEN ══ */
#screen-plan {
  flex-direction:row; overflow:hidden; height:100dvh; height:100vh;
}

.plan-library {
  width:35%; padding:16px; overflow-y:auto;
  border-right:2px solid rgba(0,0,0,.06); background:var(--yellow);
  display:flex; flex-direction:column;
}
.plan-lib-title {
  font-size:.82rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--muted); margin:12px 0 8px;
}
.plan-lib-title:first-child { margin-top:0; }
.plan-lib-card {
  background:#fff; border-radius:var(--r-md); padding:12px;
  display:flex; align-items:center; gap:10px; box-shadow:var(--sh-s);
  cursor:grab; touch-action:none; margin-bottom:8px;
  border:3px solid transparent; transition:opacity .2s;
}
.plan-lib-card .card-emoji { font-size:2rem; flex-shrink:0; }
.plan-lib-card .card-info  { flex:1; }
.plan-lib-card .card-name  { font-size:.9rem; font-weight:600; }
.plan-lib-card .card-dur   { font-size:.75rem; color:var(--muted); }
.plan-lib-card.used        { opacity:.35; pointer-events:none; }
.plan-lib-card.locked      { opacity:.35; pointer-events:none; border-style:dashed; border-color:#CCC; }
@keyframes unlockPop {
  0%   { transform:scale(.9); opacity:.3; }
  100% { transform:scale(1);  opacity:1;  }
}

.plan-timeline-wrap {
  flex:1; display:flex; flex-direction:column; padding:16px; gap:10px; overflow:hidden;
}
.plan-tl-header {
  display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.plan-tl-title  { font-size:1.1rem; font-weight:700; }
.plan-free-label {
  font-size:.9rem; font-weight:600; color:var(--teal-dk);
  background:var(--blue); padding:4px 10px; border-radius:20px;
}
.plan-timeline {
  flex:1; background:var(--blue); border-radius:var(--r-md);
  overflow-y:auto; position:relative; min-height:100px;
  padding:6px 0;
}
.plan-timeline-empty {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:var(--muted); pointer-events:none; text-align:center; padding:20px;
}

.plan-block {
  border-radius:10px; padding:8px 10px; margin:3px 8px;
  display:flex; align-items:center; gap:8px; position:relative;
  cursor:grab; touch-action:none; transition:box-shadow .15s;
  box-sizing:border-box;
}
.plan-block.mandatory { background:var(--blue); color:var(--text); }
.plan-block.choice    { background:var(--yellow); color:var(--text); }
.plan-block .block-emoji  { font-size:1.4rem; flex-shrink:0; }
.plan-block .block-name   { font-size:.88rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.plan-block .block-dur    { font-size:.75rem; opacity:.75; flex-shrink:0; }
.plan-block .block-remove {
  width:22px; height:22px; border-radius:50%; border:none;
  background:rgba(0,0,0,.18); color:white; font-size:.75rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  line-height:1; padding:0;
}
.plan-block .block-remove:active { background:rgba(0,0,0,.38); }
.plan-block.tl-dragging { opacity:.5; }

.plan-free-block {
  margin:3px 8px; border-radius:10px;
  background:repeating-linear-gradient(45deg,#EAF8FF,#EAF8FF 8px,#DEF1FF 8px,#DEF1FF 16px);
  display:flex; align-items:center; justify-content:center;
  font-size:.85rem; font-weight:600; color:var(--teal-dk); min-height:30px;
}

.plan-drop-indicator {
  height:4px; margin:0 8px; border-radius:2px;
  background:var(--teal); box-shadow:0 0 8px var(--teal); pointer-events:none;
}

.btn-letsgo {
  flex-shrink:0; padding:14px 20px; border-radius:var(--r-lg);
  border:none; background:linear-gradient(135deg,#D4F590,#BEEB6C);
  color:#3A6010; font-size:1.2rem; font-weight:800; cursor:pointer;
  box-shadow:var(--sh); transition:transform .15s;
}
.btn-letsgo:active { transform:scale(.96); }
.btn-letsgo.hidden { display:none; }

/* Portrait rotation hint */
.landscape-hint { display:none; }
@media (orientation:portrait) {
  #screen-plan .landscape-hint {
    display:flex; position:fixed; inset:0; background:rgba(255,248,240,.97);
    align-items:center; justify-content:center; flex-direction:column; gap:16px;
    z-index:300; font-size:1.4rem; font-weight:700; text-align:center; padding:32px;
  }
}
img.emoji { height:1em; width:1em; vertical-align:-.1em; display:inline-block; }

/* ══ BEDTIME OVERLAY ══ */
#overlay-bedtime {
  position:fixed; inset:0; z-index:100; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; animation:fadeIn .4s ease;
}
#overlay-bedtime.hidden { display:none; }
#bedtime-bg { position:absolute; inset:0; background:var(--yellow); transition:background 2.2s ease; }
#bedtime-bg.dark { background:#0D1B2A; }
#bedtime-stars-wrap { position:absolute; inset:0; pointer-events:none; }
.bedtime-inner { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:20px; padding:20px; }
#bedtime-fox-wrap { width:min(130px,33vw); }

<!-- ══ SETTINGS TRIGGER ══ -->
<button id="settings-btn" title="Lang drücken für Einstellungen">⚙️</button>

<script>
'use strict';

// ── TASK DEFINITIONS ─────────────────────────────────────────────

const TASKS = {
  morning: {
    deadline: { h:9, m:15 },
    mandatory: [
      { id:'pipi',      emoji:'🚽', label:'Pipi machen',           duration:3 },
      { id:'hands',     emoji:'🤲', label:'Hände waschen',          duration:2, followsId:'pipi' },
      { id:'teeth',     emoji:'🦷', label:'Zähne putzen',          duration:5 },
      { id:'face',      emoji:'🧽', label:'Gesicht waschen',        duration:2 },
      { id:'hair',      emoji:'🪮', label:'Haare kämmen',           duration:2 },
      { id:'dress',     emoji:'👕', label:'Anziehen',               duration:5 },
      { id:'sunscreen', emoji:'☀️', label:'Sonnencreme',            duration:5, conditional:true },
      { id:'go',        emoji:'🥾', label:'Jacke + Schuhe + Los!', duration:10, isLast:true },
    ],
    choice: [],
  },
  evening: {
    deadline: { h:20, m:30 },
    mandatory: [
      { id:'feet',   emoji:'🦶', label:'Füße waschen',         duration:5 },
      { id:'warts',  emoji:'🩹', label:'Warzenversorgung',      duration:5 },
      { id:'teeth',  emoji:'🦷', label:'Zähne putzen',          duration:5 },
      { id:'face',   emoji:'🧽', label:'Gesicht waschen',        duration:2 },
      { id:'hair',   emoji:'🪮', label:'Haare kämmen',          duration:2 },
      { id:'pipi',   emoji:'🚽', label:'Pipi machen',           duration:3 },
      { id:'hands',  emoji:'🤲', label:'Hände waschen',         duration:2, followsId:'pipi' },
      { id:'pyjama', emoji:'👚', label:'Schlafanzug anziehen',  duration:5 },
    ],
    choice: [
      { id:'episode',  emoji:'📺', label:'Folge schauen' },
      { id:'readbook', emoji:'📖', label:'Vorlesen'       },
      { id:'toben',    emoji:'🏃', label:'Toben'          },
      { id:'play',     emoji:'🎲', label:'Spielen'        },
    ],
  },
};

// ── STATE ────────────────────────────────────────────────────────

function newRoutine() {
  return { date:null, order:null, completed:[], globalStart:null, choiceId:null };
}

function defaults() {
  return { sunscreenEnabled:true, weatherCheck:null, disabledChoices:[], morning:newRoutine(), evening:newRoutine() };
}

let state = (function () {
  try {
    const raw = localStorage.getItem('routinenapp');
    if (!raw) return defaults();
    const s = JSON.parse(raw);
    return {
      ...defaults(), ...s,
      morning: { ...newRoutine(), ...s.morning },
      evening: { ...newRoutine(), ...s.evening },
    };
  } catch { return defaults(); }
})();

function save() { localStorage.setItem('routinenapp', JSON.stringify(state)); }

function today() { return new Date().toISOString().split('T')[0]; }

function resetDaily() {
  const t = today();
  ['morning','evening'].forEach(m => {
    if (state[m].date !== t) {
      state[m] = { ...newRoutine(), date:t };
      state[m].order = getDefaultOrder(m);
    }
  });
  save();
}

// ── TASK HELPERS ─────────────────────────────────────────────────

function visibleMandatory(mode) {
  return TASKS[mode].mandatory.filter(t => !t.conditional || state.sunscreenEnabled);
}

function getAllTasks(mode) {
  if (mode === 'morning') {
    const choice = TASKS[mode].choice.filter(t => !(state.disabledChoices||[]).includes(t.id));
    return [...visibleMandatory(mode), ...choice];
  }
  // Abend: nur Pflicht + gewählte Wahlaufgabe
  const mandatory = visibleMandatory(mode);
  const choiceTask = state.evening.choiceId
    ? TASKS.evening.choice.find(t => t.id === state.evening.choiceId) : null;
  return choiceTask ? [...mandatory, choiceTask] : mandatory;
}

function getDefaultOrder(mode) {
  const mand    = visibleMandatory(mode);
  const nonLast = mand.filter(t => !t.isLast);
  const last    = mand.find(t => t.isLast);
  if (mode === 'morning') {
    const choice = TASKS[mode].choice;
    const ids    = [...nonLast.map(t => t.id), ...choice.map(t => t.id)];
    if (last) ids.push(last.id);
    return ids;
  }
  // Abend: nur Pflichtaufgaben (Wahlaufgabe separat via choiceId)
  const ids = nonLast.map(t => t.id);
  if (last) ids.push(last.id);
  return ids;
}

// Keep order in sync when sunscreen toggle changes task visibility
function syncOrder(mode) {
  const ms     = state[mode];
  const allIds = getAllTasks(mode).map(t => t.id);
  const lastId = TASKS[mode].mandatory.find(t => t.isLast)?.id;

  if (!ms.order) { ms.order = getDefaultOrder(mode); return; }

  // Remove tasks no longer visible
  ms.order = ms.order.filter(id => allIds.includes(id));

  // Add newly visible tasks (insert before lastId, or append)
  for (const id of allIds) {
    if (!ms.order.includes(id)) {
      if (lastId && ms.order.includes(lastId)) {
        ms.order.splice(ms.order.indexOf(lastId), 0, id);
      } else {
        ms.order.push(id);
      }
    }
  }

  // Ensure lastId stays last
  if (lastId && ms.order.includes(lastId)) {
    ms.order = ms.order.filter(id => id !== lastId);
    ms.order.push(lastId);
  }

  // Ensure followsId tasks stay directly after their parent
  for (const t of getAllTasks(mode)) {
    if (t.followsId && ms.order.includes(t.id) && ms.order.includes(t.followsId)) {
      ms.order = ms.order.filter(id => id !== t.id);
      ms.order.splice(ms.order.indexOf(t.followsId) + 1, 0, t.id);
    }
  }
}

function getTotalMin(mode) {
  const ms  = state[mode];
  const all = getAllTasks(mode);
  return (ms.order || []).reduce((sum, id) => {
    const t = all.find(x => x.id === id);
    return sum + (t?.duration ?? 0);
  }, 0);
}

function getElapsedMin(mode) {
  const gs = state[mode]?.globalStart;
  return gs ? (Date.now() - gs) / 60000 : 0;
}

function allMandatoryDone(mode) {
  return visibleMandatory(mode).every(t => state[mode].completed.includes(t.id));
}

// ── NAVIGATION ───────────────────────────────────────────────────

let currentMode = null;
let timeIv      = null;

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() {
  clearInterval(timeIv); timeIv = null;
  currentMode = null;
  const wrap = document.getElementById('budget-wrap');
  if (wrap) wrap.remove();
  switchScreen('screen-home');
}

function showRoutine(mode) {
  currentMode = mode;
  resetDaily();
  if (!state[mode].order) { state[mode].order = getDefaultOrder(mode); }
  syncOrder(mode);
  save();
  // Abend: Startzeit setzen wenn noch nicht gesetzt
  if (mode === 'evening' && !state.evening.globalStart) {
    state.evening.globalStart = Date.now();
    save();
  }
  renderRoutine();
  switchScreen('screen-routine');
  updateTimeDisplay();
  timeIv = setInterval(updateTimeDisplay, 10000);
  checkWeather();
}

// ── RENDER ───────────────────────────────────────────────────────

function renderRoutine() {
  const mode = currentMode;
  const ms   = state[mode];
  const list = document.getElementById('task-list');
  const order = ms.order || getDefaultOrder(mode);

  if (mode === 'evening') {
    const mandatory  = visibleMandatory('evening');
    const choiceTask = ms.choiceId ? TASKS.evening.choice.find(t => t.id === ms.choiceId) : null;
    const available  = TASKS.evening.choice.filter(t => !(state.disabledChoices||[]).includes(t.id));

    // Pflichtaufgaben zuerst (Wahlaufgabe aus order ausfiltern)
    let html = order
      .filter(id => mandatory.some(t => t.id === id))
      .map(id => renderRow(mandatory.find(t => t.id === id), ms))
      .join('');

    // Wahlaufgabe immer zuletzt
    if (choiceTask) html += renderChoiceRow(choiceTask, ms, available);
    else            html += renderChoicePicker(available);

    list.innerHTML = html;
  } else {
    list.innerHTML = order.map(id => {
      const t = getAllTasks(mode).find(x => x.id === id);
      return t ? renderRow(t, ms) : '';
    }).join('');
  }

  initDrag(list);
  parseEmoji(list);
}

function parseEmoji(el) {
  if (typeof twemoji !== 'undefined') twemoji.parse(el, { folder:'svg', ext:'.svg' });
}

function taskRowHeight(duration) {
  return Math.max(100, duration * 20);
}

function renderRow(t, ms) {
  const done   = ms.completed.includes(t.id);
  const isLast = !!t.isLast;
  const h      = taskRowHeight(t.duration);

  let rowCls = 'task-row';
  if (done)   rowCls += ' done';
  if (isLast && !done) rowCls += ' last-step';

  const tag = (isLast && !done) ? `<span class="task-tag">Letzter Schritt</span>` : '';

  const content = `<div class="task-content">
    <div class="task-emoji-big">${t.emoji}</div>
    <div class="task-text-group">
      <div class="task-name">${t.label}</div>
      <div class="task-dur">${t.duration}&nbsp;min</div>
      ${tag}
    </div>
  </div>`;

  const checkBtn = done
    ? `<button class="btn-check" onclick="unfinishTask('${t.id}')">✅</button>`
    : `<button class="btn-check" onclick="finishTask('${t.id}')">✓</button>`;

  return `<div class="${rowCls}" data-id="${t.id}"${isLast ? ' data-last="true"' : ''}${t.followsId ? ' data-follows="true"' : ''} style="min-height:${h}px">
  <div class="drag-handle">⠿</div>${content}${checkBtn}
</div>`;
}

function renderChoiceRow(task, ms, available) {
  const h = 300; // Wahlaufgabe: ca. 3× eine Pflichtaufgabe

  const swapChips = `<div class="choice-swap-row">${
    available.filter(t => t.id !== task.id).map(t =>
      `<button class="choice-swap-btn" onclick="selectChoice('${t.id}')">${t.emoji} ${t.label}</button>`
    ).join('')
  }</div>`;

  return `<div class="task-row" data-id="${task.id}" data-choice="true" style="min-height:${h}px">
  <div class="drag-handle" style="visibility:hidden">⠿</div>
  <div class="task-content">
    <div class="task-emoji-big">${task.emoji}</div>
    <div class="task-text-group">
      <div class="task-name">${task.label}</div>
      <span class="task-tag choice-tag">Wahlaufgabe</span>
      ${swapChips}
    </div>
  </div>
</div>`;
}

function renderChoicePicker(available) {
  const chips = available.map(t =>
    `<button class="choice-chip" onclick="selectChoice('${t.id}')">${t.emoji} ${t.label}</button>`
  ).join('');
  return `<div class="choice-section">
    <div class="choice-section-label">Wahlaufgabe</div>
    <div class="choice-chips">${chips}</div>
  </div>`;
}

function selectChoice(id) {
  const ms = state.evening;
  if (!ms.order) ms.order = getDefaultOrder('evening');
  ms.completed = ms.completed.filter(x => x !== ms.choiceId);
  // Alte Wahlaufgabe aus order entfernen, neue ans Ende
  ms.order = ms.order.filter(x => x !== ms.choiceId);
  ms.order.push(id);
  ms.choiceId = id;
  save();
  renderRoutine();
  updateTimeDisplay();
}

// ── TIME DISPLAY ─────────────────────────────────────────────────

function updateTimeDisplay() {
  if (!currentMode) return;
  const container = document.getElementById('time-display');
  if (!container) return;
  if (currentMode === 'morning') {
    renderMorningTimeDisplay(container);
  } else {
    renderEveningBudgetBar(container);
  }
}

function renderMorningTimeDisplay(container) {
  const total   = getTotalMin('morning');
  const elapsed = getElapsedMin('morning');
  const started = !!state.morning.globalStart;
  const pct     = started && total > 0 ? Math.min((elapsed / total) * 100, 100) : 0;
  const over    = elapsed > total;
  container.innerHTML = `
    <div class="time-track"><div class="time-fill${over ? ' over' : ''}" style="width:${pct}%"></div></div>
    <div class="time-label">${started ? `${Math.round(elapsed)} / ${total} min` : `${total} min geplant`}</div>`;
}

function renderEveningBudgetBar(container) {
  const ms        = state.evening;
  const mandatory = visibleMandatory('evening');
  const deadline  = new Date(); deadline.setHours(20, 30, 0, 0);
  const start     = ms.globalStart ? new Date(ms.globalStart) : new Date();
  const totalWin  = Math.max(1, (deadline - start) / 60000);
  const elapsed   = Math.min((Date.now() - start) / 60000, totalWin); // tatsächlich vergangene Zeit
  const timeLeft  = Math.max(0, totalWin - elapsed);

  const remainMandDur = mandatory
    .filter(t => !ms.completed.includes(t.id))
    .reduce((sum, t) => sum + t.duration, 0);
  // Freie Zeit geht komplett zur Wahlaufgabe
  const choiceDur = Math.max(0, timeLeft - remainMandDur);

  const pElapsed = (elapsed       / totalWin * 100).toFixed(1);
  const pMand    = (remainMandDur / totalWin * 100).toFixed(1);
  const pChoice  = (choiceDur     / totalWin * 100).toFixed(1);

  const nowMin = timeLeft;
  const h = Math.floor(nowMin / 60);
  const m = Math.round(nowMin % 60);
  const remaining = h > 0 ? `${h} h ${m} min` : `${Math.round(nowMin)} min`;

  // Balken ins Header-Element einbauen (volle Breite, außerhalb des top-row)
  const header = document.querySelector('.routine-header');
  let wrap = document.getElementById('budget-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'budget-wrap';
    wrap.className = 'budget-wrap';
    header.appendChild(wrap);
  }
  wrap.innerHTML = `
    <div class="budget-bar">
      <div class="budget-seg budget-done"      style="width:${pElapsed}%"></div>
      <div class="budget-seg budget-mandatory" style="width:${pMand}%"></div>
      <div class="budget-seg budget-choice"    style="width:${pChoice}%"></div>
    </div>
    <div class="budget-labels">
      <span>🌙 Bis zum Schlafen</span>
      <span>noch ${remaining}</span>
    </div>`;
  container.innerHTML = '';
}

// ── FOX BUDDY ─────────────────────────────────────────────────────
const FOX_EMOJIS = ['⭐','🌟','🎉','👏','💫','✨','🥰','🎊','💛','🌈'];
let _foxTimer = null;

function foxSay(msg, duration = 2800) {
  const bubble = document.getElementById('fox-bubble');
  if (!bubble) return;
  bubble.textContent = msg;
  bubble.classList.add('visible');
  clearTimeout(_foxTimer);
  _foxTimer = setTimeout(() => bubble.classList.remove('visible'), duration);
}

function foxReact(remaining) {
  const svg     = document.getElementById('fox-svg');
  const armDown = document.getElementById('fox-arm-down');
  const armWave = document.getElementById('fox-arm-wave');
  if (!svg) return;
  svg.className.baseVal = '';
  void svg.getBoundingClientRect(); // reflow to restart animation
  if (remaining === 0) {
    armDown.style.display = '';
    armWave.style.display = 'none';
    svg.className.baseVal = 'cheer';
    foxSay('🥳🎉🎊', 4000);
  } else {
    armDown.style.display = 'none';
    armWave.style.display = '';
    svg.className.baseVal = 'wave';
    foxSay(remaining === 1
      ? '🌙💪'
      : FOX_EMOJIS[Math.floor(Math.random() * FOX_EMOJIS.length)]);
  }
  svg.addEventListener('animationend', () => {
    svg.className.baseVal = '';
    armDown.style.display = '';
    armWave.style.display = 'none';
  }, { once: true });
}

// ── TASK ACTIONS ─────────────────────────────────────────────────

function spawnConfetti(originEl) {
  const rect   = originEl.getBoundingClientRect();
  const ox     = rect.left + rect.width  / 2;
  const oy     = rect.top  + rect.height / 2;
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c'];
  const count  = 18;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
    const dist  = 60 + Math.random() * 60;
    el.style.setProperty('--cx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--cy', Math.sin(angle) * dist - 20 + 'px');
    el.style.setProperty('--cr', (Math.random() * 360 - 180) + 'deg');
    el.style.setProperty('--cd', (0.5 + Math.random() * 0.4) + 's');
    el.style.left = ox + 'px';
    el.style.top  = oy + 'px';
    el.style.background = colors[i % colors.length];
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function finishTask(id) {
  const mode = currentMode;
  const ms   = state[mode];

  // Set global start on first task
  if (!ms.globalStart) { ms.globalStart = Date.now(); }

  ms.completed.push(id);
  save();

  // Pulse + confetti
  const row = document.querySelector(`.task-row[data-id="${id}"]`);
  if (row) {
    const btn = row.querySelector('.btn-check');
    if (btn) {
      btn.classList.add('pulse');
      setTimeout(() => btn.classList.remove('pulse'), 300);
      spawnConfetti(btn);
    }
  }

  // Fox reaction
  const remaining = visibleMandatory(mode).filter(t => !ms.completed.includes(t.id)).length;
  foxReact(remaining);

  if (allMandatoryDone(mode)) {
    if (mode === 'evening') {
      setTimeout(() => showBedtime(), 400);
    } else {
      setTimeout(() => showCompletion(), 400);
    }
    return;
  }

  setTimeout(() => {
    renderRoutine();
    updateTimeDisplay();
  }, 320);
}

function unfinishTask(id) {
  const ms = state[currentMode];
  ms.completed = ms.completed.filter(x => x !== id);
  save();
  renderRoutine();
  updateTimeDisplay();
}

// ── DRAG & DROP (Routine-Liste) ───────────────────────────────────

let planDrag = null; // unused placeholder for backwards compat

// ── DRAG & DROP ──────────────────────────────────────────────────

let dragState = null;

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const { listEl, el } = dragState;
  const y = e.clientY;

  const choiceRow = listEl.querySelector('.task-row[data-choice]:not(.dragging)');
  const siblings  = [...listEl.querySelectorAll('.task-row:not(.dragging):not([data-choice])')]
    .filter(r => r.dataset.last !== 'true');
  const lastRow   = listEl.querySelector('.task-row[data-last="true"]');

  let insertBefore = null;
  for (const r of siblings) {
    const rect = r.getBoundingClientRect();
    if (y < rect.top + rect.height / 2) { insertBefore = r; break; }
  }

  if (insertBefore)   listEl.insertBefore(el, insertBefore);
  else if (lastRow)   listEl.insertBefore(el, lastRow);
  else if (choiceRow) listEl.insertBefore(el, choiceRow);
  else                listEl.appendChild(el);
}

function onDragEnd() {
  if (!dragState) return;
  dragState.el.classList.remove('dragging');

  // Save new order from DOM
  const newOrder = [...dragState.listEl.querySelectorAll('.task-row')].map(r => r.dataset.id);
  state[currentMode].order = newOrder;
  save();

  cleanupDrag();
}

function onDragCancel() {
  if (!dragState) return;
  dragState.el.classList.remove('dragging');
  cleanupDrag();
  renderRoutine(); // restore saved order
}

function cleanupDrag() {
  dragState = null;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragEnd);
  document.removeEventListener('pointercancel', onDragCancel);
}

function initDrag(listEl) {
  listEl.addEventListener('pointerdown', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const row = handle.closest('.task-row');
    if (!row || row.dataset.last === 'true' || row.dataset.choice === 'true' || row.dataset.follows === 'true' || row.classList.contains('done')) return;

    e.preventDefault();
    row.classList.add('dragging');
    dragState = { listEl, el: row };

    document.addEventListener('pointermove',   onDragMove,   { passive:false });
    document.addEventListener('pointerup',     onDragEnd);
    document.addEventListener('pointercancel', onDragCancel);
  });
}

// ── SETTINGS ─────────────────────────────────────────────────────

function openSettings() {
  const btn = document.getElementById('btn-sunscreen');
  btn.textContent = state.sunscreenEnabled ? 'Ein ☀️' : 'Aus';
  btn.className   = `toggle ${state.sunscreenEnabled ? 'on' : 'off'}`;

  const wc = state.weatherCheck;
  const wi = document.getElementById('weather-info');
  if (wc) {
    const t = new Date(wc.ts).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
    wi.textContent = `Check: ${t} · UV ${wc.uv ?? '?'} · Sonne ${Math.round((wc.sun||0)/3600)}h · ${wc.auto ? 'auto' : 'manuell'}`;
  } else {
    wi.textContent = 'Noch kein Wetter-Check heute';
  }
  // Choice-Aufgaben-Toggles
  const disabled = state.disabledChoices || [];
  document.getElementById('choice-settings').innerHTML = TASKS.evening.choice.map(t => {
    const on = !disabled.includes(t.id);
    return `<div class="setting-row">
      <span class="setting-label">${t.emoji} ${t.label}</span>
      <button class="toggle ${on ? 'on' : 'off'}" onclick="toggleChoice('${t.id}')">${on ? 'Ein' : 'Aus'}</button>
    </div>`;
  }).join('');

  document.getElementById('modal-settings').classList.remove('hidden');
}

function closeSettings() {
  document.getElementById('modal-settings').classList.add('hidden');
}

function toggleChoice(id) {
  const arr = state.disabledChoices || [];
  const idx = arr.indexOf(id);
  if (idx === -1) arr.push(id);
  else arr.splice(idx, 1);
  state.disabledChoices = arr;
  // Wenn die aktive Wahlaufgabe deaktiviert wurde, zurücksetzen
  if (state.evening.choiceId === id && arr.includes(id)) {
    state.evening.completed = state.evening.completed.filter(x => x !== id);
    state.evening.choiceId = null;
  }
  syncOrder('evening');
  save();
  openSettings();
}

function resetEvening() {
  closeSettings();
  state.evening.completed   = [];
  state.evening.globalStart = Date.now();
  state.evening.choiceId    = null;
  state.evening.order       = getDefaultOrder('evening');
  save();
  if (currentMode === 'evening') { renderRoutine(); updateTimeDisplay(); }
}

function toggleSunscreen() {
  state.sunscreenEnabled = !state.sunscreenEnabled;
  if (state.weatherCheck) state.weatherCheck.auto = false;
  syncOrder('morning'); // sunscreen only exists in morning
  save();
  const btn = document.getElementById('btn-sunscreen');
  btn.textContent = state.sunscreenEnabled ? 'Ein ☀️' : 'Aus';
  btn.className   = `toggle ${state.sunscreenEnabled ? 'on' : 'off'}`;
  if (currentMode === 'morning') { renderRoutine(); updateTimeDisplay(); }
}

;(function () {
  const btn = document.getElementById('settings-btn');
  let timer = null;
  const start  = () => { timer = setTimeout(() => { timer = null; openSettings(); }, 2500); };
  const cancel = () => { clearTimeout(timer); timer = null; };
  btn.addEventListener('pointerdown', start);
  ['pointerup','pointercancel','pointerleave'].forEach(e => btn.addEventListener(e, cancel));
  btn.addEventListener('dblclick', () => { cancel(); openSettings(); });
})();

// ── WEATHER ──────────────────────────────────────────────────────

async function checkWeather() {
  if (new Date().getHours() < 6) return;
  if (state.weatherCheck?.date === today()) return;
  try {
    const url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude=54.133&longitude=10.624' +
      '&daily=uv_index_max,sunshine_duration' +
      '&timezone=Europe%2FBerlin&forecast_days=1';
    const r = await fetch(url, { cache:'no-cache' });
    if (!r.ok) return;
    const d   = await r.json();
    const uv  = d.daily.uv_index_max?.[0]      ?? 0;
    const sun = d.daily.sunshine_duration?.[0] ?? 0;
    state.sunscreenEnabled = uv >= 3;
    state.weatherCheck = { date:today(), uv, sun, auto:true, ts:Date.now() };
    syncOrder('morning');
    save();
    if (currentMode) { renderRoutine(); updateTimeDisplay(); }
  } catch { /* offline */ }
}
